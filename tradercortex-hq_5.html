<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TraderCortex HQ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --ink:#07070c; --ink2:#0e0e17; --ink3:#14141f; --ink4:#1c1c2a; --ink5:#252538;
  --line:rgba(255,255,255,0.05); --line2:rgba(255,255,255,0.09); --line3:rgba(255,255,255,0.16);
  --t1:#eeeeff; --t2:#8484a8; --t3:#3e3e5e;
  --violet:#8b5cf6; --vsoft:rgba(139,92,246,0.1); --vglow:rgba(139,92,246,0.22);
  --cyan:#06d6d6; --csoft:rgba(6,214,214,0.08); --cglow:rgba(6,214,214,0.18);
  --green:#10f08c; --gsoft:rgba(16,240,140,0.08); --gglow:rgba(16,240,140,0.18);
  --amber:#f5a623; --asoft:rgba(245,166,35,0.08); --aglow:rgba(245,166,35,0.18);
  --rose:#ff4d6d; --rsoft:rgba(255,77,109,0.08); --rglow:rgba(255,77,109,0.18);
  --blue:#4da6ff; --bsoft:rgba(77,166,255,0.08); --bglow:rgba(77,166,255,0.18);
  --mono:'JetBrains Mono',monospace; --sans:'Manrope',system-ui,sans-serif;
  --sw:232px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--ink);color:var(--t1);font-family:var(--sans);font-size:13px;display:flex;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 55% 45% at 12% 18%,rgba(139,92,246,.07) 0%,transparent 65%),
    radial-gradient(ellipse 45% 35% at 88% 82%,rgba(6,214,214,.05) 0%,transparent 60%),
    radial-gradient(ellipse 35% 28% at 55% 55%,rgba(16,240,140,.025) 0%,transparent 55%)}

/* SIDEBAR */
.sb{width:var(--sw);min-width:var(--sw);height:100vh;background:rgba(14,14,23,.95);backdrop-filter:blur(24px);border-right:1px solid var(--line);display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden;z-index:10;position:relative}
.sb::-webkit-scrollbar{width:0}
.logo{padding:20px 16px 16px;border-bottom:1px solid var(--line)}
.logo-chip{display:inline-flex;align-items:center;gap:5px;background:var(--vsoft);border:1px solid rgba(139,92,246,.18);border-radius:5px;padding:2px 8px;margin-bottom:7px}
.logo-dot{width:5px;height:5px;border-radius:50%;background:var(--violet);box-shadow:0 0 7px var(--violet);animation:blink 2.5s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1;box-shadow:0 0 7px var(--violet)}50%{opacity:.5;box-shadow:0 0 14px var(--violet)}}
.logo-chip span{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--violet);font-family:var(--mono)}
.logo-name{font-size:16px;font-weight:800;letter-spacing:-.02em;color:var(--t1)}
.logo-sub{font-size:9.5px;color:var(--t3);font-family:var(--mono);margin-top:2px;letter-spacing:.04em}
.nav-g{padding:10px 10px 4px}
.nav-gl{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--t3);padding:0 8px;margin-bottom:4px;font-family:var(--mono)}
.nav-i{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;cursor:pointer;color:var(--t2);font-size:12.5px;font-weight:500;transition:all .13s;position:relative;margin-bottom:2px;user-select:none}
.nav-i:hover{background:var(--ink3);color:var(--t1)}
.nav-i.on{background:var(--vsoft);color:var(--t1);border:1px solid rgba(139,92,246,.14)}
.nav-i.on::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:2px;height:16px;background:var(--violet);border-radius:0 2px 2px 0;box-shadow:0 0 9px var(--violet)}
.nav-ico{width:27px;height:27px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;background:var(--ink4);flex-shrink:0}
.nav-i.on .nav-ico{background:var(--vsoft)}
.nav-txt{flex:1}
.nav-n{font-size:9.5px;font-family:var(--mono);font-weight:600;padding:1px 6px;border-radius:8px;background:var(--ink4);color:var(--t3)}
.nav-i.on .nav-n{background:var(--vsoft);color:var(--violet)}
.nav-n.hot{background:var(--rsoft);color:var(--rose)}
.sb-foot{margin-top:auto;padding:12px 14px;border-top:1px solid var(--line)}
.conn{display:flex;align-items:center;gap:6px;font-size:9.5px;font-family:var(--mono);color:var(--t3)}
.conn-d{width:6px;height:6px;border-radius:50%;background:var(--t3);transition:all .3s}
.conn-d.live{background:var(--green);box-shadow:0 0 8px var(--green)}
.conn-d.err{background:var(--rose)}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;min-width:0;position:relative;z-index:1}
.topbar{height:52px;display:flex;align-items:center;padding:0 22px;gap:12px;border-bottom:1px solid var(--line);background:rgba(7,7,12,.65);backdrop-filter:blur(20px);flex-shrink:0}
.bc{display:flex;align-items:center;gap:6px}
.bc-home{font-size:11.5px;color:var(--t3);cursor:pointer;transition:color .15s;font-weight:500}
.bc-home:hover{color:var(--t2)}
.bc-sep{color:var(--t3);font-size:11px}
.bc-cur{font-size:14px;font-weight:700;color:var(--t1);letter-spacing:-.01em}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.search-wrap{position:relative;display:flex;align-items:center}
.search-in{background:var(--ink3);border:1px solid var(--line2);border-radius:9px;padding:6px 12px 6px 32px;color:var(--t1);font-family:var(--sans);font-size:11.5px;outline:none;width:190px;transition:all .2s;font-weight:500}
.search-in:focus{border-color:rgba(139,92,246,.4);box-shadow:0 0 0 3px var(--vsoft);width:250px}
.search-in::placeholder{color:var(--t3)}
.s-ico{position:absolute;left:10px;color:var(--t3);font-size:12px;pointer-events:none}
.sdrop{position:absolute;top:calc(100% + 8px);left:0;right:0;min-width:320px;background:var(--ink2);border:1px solid var(--line2);border-radius:12px;overflow:hidden;display:none;z-index:100;box-shadow:0 24px 60px rgba(0,0,0,.55)}
.sdrop.open{display:block}
.sd-row{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--line);transition:background .1s}
.sd-row:last-child{border:none}
.sd-row:hover{background:var(--ink3)}
.sd-pbar{width:3px;min-height:14px;border-radius:2px;flex-shrink:0}
.sd-t{font-size:12px;font-weight:600;color:var(--t1);margin-bottom:1px}
.sd-m{font-size:9.5px;color:var(--t3);font-family:var(--mono)}
.btn{display:inline-flex;align-items:center;gap:5px;font-family:var(--sans);font-size:12px;font-weight:600;padding:6px 15px;border-radius:8px;border:1px solid var(--line2);background:var(--ink3);color:var(--t2);cursor:pointer;transition:all .13s;white-space:nowrap}
.btn:hover{background:var(--ink4);color:var(--t1);border-color:var(--line3)}
.btn-v{background:var(--violet);border-color:var(--violet);color:#fff;box-shadow:0 0 20px var(--vglow)}
.btn-v:hover{background:#9d7af7;border-color:#9d7af7;box-shadow:0 0 28px var(--vglow)}
.content{flex:1;overflow-y:auto;padding:26px 26px 36px}
.content::-webkit-scrollbar{width:4px}
.content::-webkit-scrollbar-thumb{background:var(--line2);border-radius:2px}

/* CARDS */
.mgrid{display:grid;gap:12px;margin-bottom:24px}
.g4{grid-template-columns:repeat(4,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
.g2{grid-template-columns:repeat(2,1fr)}
.mc{background:rgba(20,20,31,.75);backdrop-filter:blur(16px);border:1px solid var(--line);border-radius:14px;padding:20px 22px;position:relative;overflow:hidden;transition:border-color .15s}
.mc:hover{border-color:var(--line2)}
.mc::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;opacity:.45;background:linear-gradient(90deg,transparent,var(--ac,var(--violet)),transparent)}
.mc-l{font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin-bottom:8px;font-family:var(--mono)}
.mc-v{font-family:var(--mono);font-size:34px;font-weight:600;line-height:1;margin-bottom:6px;letter-spacing:-.025em}
.mc-s{font-size:11.5px;color:var(--t3);line-height:1.55;font-weight:400}
.mc-bar{height:2px;background:var(--ink5);border-radius:1px;margin:10px 0 6px;overflow:hidden}
.mc-fill{height:100%;border-radius:1px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.mc-glow{position:absolute;bottom:-24px;right:-24px;width:90px;height:90px;border-radius:50%;opacity:.12;filter:blur(24px);pointer-events:none}

/* SECTION HEADER */
.sh{display:flex;align-items:center;gap:12px;margin-bottom:14px;margin-top:8px}
.sh-l{font-size:9.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--t3);font-family:var(--mono);white-space:nowrap}
.sh-line{flex:1;height:1px;background:var(--line)}
.sh-n{font-size:9.5px;font-family:var(--mono);color:var(--t3);font-weight:600}

/* TASKS */
.tlist{display:flex;flex-direction:column;gap:6px;margin-bottom:22px}
.task{display:flex;align-items:flex-start;gap:11px;padding:14px 16px;border-radius:11px;border:1px solid var(--line);background:rgba(20,20,31,.45);cursor:pointer;transition:all .13s;position:relative}
.task:hover{border-color:var(--line2);background:rgba(28,28,42,.65);transform:translateX(2px)}
.task.tdone{opacity:.38}
.task.tdone:hover{opacity:.6}
.pbar{width:3px;min-height:18px;border-radius:2px;flex-shrink:0;align-self:stretch;margin-top:2px}
.p-c{background:var(--rose);box-shadow:0 0 7px var(--rglow)}
.p-h{background:var(--amber)}
.p-m{background:var(--blue)}
.p-l{background:var(--ink5)}
.chk{width:17px;height:17px;border:1.5px solid var(--line3);border-radius:5px;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:2px;transition:all .15s;font-size:9px;font-weight:800}
.chk.done{background:var(--green);border-color:var(--green);color:#000;box-shadow:0 0 8px var(--gglow)}
.chk.partial{background:var(--amber);border-color:var(--amber);color:#000}
.chk.wip{border-color:var(--cyan);color:var(--cyan)}
.tb{flex:1;min-width:0}
.tt{font-size:13px;font-weight:600;color:var(--t1);line-height:1.45;margin-bottom:5px}
.tt.s{text-decoration:line-through;color:var(--t3)}
.td{font-size:11.5px;color:var(--t3);line-height:1.55;margin-bottom:7px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;font-weight:400}
.tags{display:flex;gap:5px;flex-wrap:wrap}
.tag{font-size:9.5px;font-family:var(--mono);font-weight:600;padding:2px 8px;border-radius:5px;letter-spacing:.03em}
.tg{background:var(--ink4);color:var(--t3)}
.tv{background:var(--vsoft);color:var(--violet);border:1px solid rgba(139,92,246,.15)}
.tg2{background:var(--gsoft);color:var(--green);border:1px solid rgba(16,240,140,.15)}
.ta{background:var(--asoft);color:var(--amber);border:1px solid rgba(245,166,35,.15)}
.tr{background:var(--rsoft);color:var(--rose);border:1px solid rgba(255,77,109,.15)}
.tc{background:var(--csoft);color:var(--cyan);border:1px solid rgba(6,214,214,.15)}
.tb2{background:var(--bsoft);color:var(--blue);border:1px solid rgba(77,166,255,.15)}

/* PHASE ACCORDION */
.pa{border:1px solid var(--line);border-radius:13px;overflow:hidden;margin-bottom:9px;background:rgba(14,14,23,.55);transition:border-color .15s}
.pa:hover{border-color:var(--line2)}
.pa-h{display:flex;align-items:center;gap:12px;padding:15px 17px;cursor:pointer;transition:background .13s}
.pa-h:hover{background:rgba(255,255,255,.02)}
.pa-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.pa-name{font-size:13.5px;font-weight:700;color:var(--t1);flex:1}
.pa-per{font-size:10px;font-family:var(--mono);color:var(--t3)}
.pa-pill{font-size:9px;font-family:var(--mono);font-weight:700;padding:3px 11px;border-radius:20px;letter-spacing:.05em}
.pa-stat{font-size:10px;font-family:var(--mono)}
.pa-ch{color:var(--t3);font-size:10px;transition:transform .25s cubic-bezier(.4,0,.2,1);flex-shrink:0}
.pa-ch.o{transform:rotate(180deg)}
.pa-body{display:none;padding:0 15px 14px;border-top:1px solid var(--line)}
.pa-body.o{display:block}

/* ROADMAP TIMELINE */
.rm-wrap{position:relative;padding:8px 0 8px 0}
.rm-timeline{display:flex;flex-direction:column;gap:0}
.rm-phase{display:flex;gap:20px;margin-bottom:0;position:relative}
.rm-phase:not(:last-child) .rm-spine{height:100%}
.rm-left{display:flex;flex-direction:column;align-items:center;width:36px;flex-shrink:0}
.rm-node{width:14px;height:14px;border-radius:50%;border:2px solid;flex-shrink:0;position:relative;z-index:2;margin-top:18px}
.rm-node.active{box-shadow:0 0 0 4px var(--vglow);animation:nodepulse 2s ease-in-out infinite}
@keyframes nodepulse{0%,100%{box-shadow:0 0 0 4px var(--vglow)}50%{box-shadow:0 0 0 8px rgba(139,92,246,.1)}}
.rm-spine{width:2px;flex:1;background:var(--line);margin-top:4px;margin-bottom:0;min-height:40px}
.rm-right{flex:1;padding-bottom:32px}
.rm-card{border:1px solid var(--line);border-radius:13px;overflow:hidden;background:rgba(14,14,23,.55);transition:border-color .2s;margin-top:8px}
.rm-card:hover{border-color:var(--line2)}
.rm-card-h{display:flex;align-items:center;gap:12px;padding:14px 17px;cursor:pointer}
.rm-card-h:hover{background:rgba(255,255,255,.015)}
.rm-ph-name{font-size:13px;font-weight:700;color:var(--t1);flex:1}
.rm-ph-per{font-size:9.5px;font-family:var(--mono);color:var(--t3)}
.rm-pill{font-size:8.5px;font-family:var(--mono);font-weight:700;padding:2px 9px;border-radius:20px;letter-spacing:.06em}
.rm-prog{font-size:9.5px;font-family:var(--mono);font-weight:600}
.rm-body{display:none;padding:0 14px 12px;border-top:1px solid var(--line)}
.rm-body.o{display:block}
.rm-ch{color:var(--t3);font-size:10px;transition:transform .25s;flex-shrink:0}
.rm-ch.o{transform:rotate(180deg)}
.rm-bar-wrap{height:3px;background:var(--ink5);border-radius:2px;margin:0 17px 0;overflow:hidden}
.rm-bar-fill{height:100%;border-radius:2px;transition:width .8s cubic-bezier(.4,0,.2,1)}

/* AGENTS */
.ag-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:22px}
.ag-card{background:rgba(20,20,31,.75);backdrop-filter:blur(16px);border:1px solid var(--line);border-radius:14px;padding:18px;position:relative;overflow:hidden;transition:border-color .15s}
.ag-card:hover{border-color:var(--line2)}
.ag-glow{position:absolute;top:-30px;right:-30px;width:100px;height:100px;border-radius:50%;opacity:.1;filter:blur(30px);pointer-events:none}
.ag-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:10px}
.ag-av{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.ag-name{font-size:13px;font-weight:700;color:var(--t1);line-height:1.2;margin-bottom:2px}
.ag-role{font-size:10px;color:var(--t3);font-weight:500}
.ag-status{font-size:8.5px;font-family:var(--mono);font-weight:700;padding:2px 8px;border-radius:20px;display:inline-block;letter-spacing:.07em;margin-bottom:10px}
.ag-miss{font-size:11.5px;color:var(--t2);line-height:1.6;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--line)}
.ag-rules{display:flex;flex-direction:column;gap:7px}
.ag-rule{font-size:10.5px;color:var(--t3);line-height:1.5;display:flex;gap:7px}
.rl{font-family:var(--mono);font-size:9px;font-weight:700;flex-shrink:0;margin-top:1px}
.rl-ok{color:var(--green)}
.rl-no{color:var(--rose)}

/* FILTERS */
.fbar{display:flex;gap:6px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.fchip{font-size:10px;font-family:var(--mono);font-weight:600;padding:4px 12px;border-radius:6px;border:1px solid var(--line);background:transparent;color:var(--t3);cursor:pointer;transition:all .12s;letter-spacing:.04em}
.fchip:hover{border-color:var(--line2);color:var(--t2)}
.fchip.on{background:var(--vsoft);border-color:rgba(139,92,246,.3);color:var(--violet)}
.fc{margin-left:auto;font-size:10px;font-family:var(--mono);color:var(--t3);font-weight:600}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(8px);z-index:200;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--ink2);border:1px solid var(--line2);border-radius:16px;padding:26px;width:490px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 40px 100px rgba(0,0,0,.65)}
.modal-title{font-size:16px;font-weight:800;color:var(--t1);margin-bottom:18px;letter-spacing:-.01em}
.field{margin-bottom:13px}
.fl{font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin-bottom:5px;font-family:var(--mono)}
.field input,.field select,.field textarea{width:100%;background:var(--ink3);border:1px solid var(--line2);border-radius:9px;padding:9px 12px;color:var(--t1);font-family:var(--sans);font-size:13px;font-weight:500;outline:none;transition:all .13s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:rgba(139,92,246,.5);box-shadow:0 0 0 3px var(--vsoft)}
.field select option{background:var(--ink2)}
.field textarea{resize:vertical;min-height:75px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.mfoot{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;padding-top:15px;border-top:1px solid var(--line)}

/* DIGEST BANNER */
.digest-hint{background:var(--vsoft);border:1px solid rgba(139,92,246,.2);border-radius:10px;padding:12px 16px;margin-bottom:20px;font-size:12px;color:var(--violet);display:flex;align-items:center;gap:10px}
.digest-hint strong{font-weight:700}

/* SPRINT BANNER */
.sprint-banner{background:linear-gradient(135deg,rgba(16,240,140,.07),rgba(139,92,246,.07));border:1px solid rgba(16,240,140,.15);border-radius:10px;padding:14px 18px;margin-bottom:20px;display:flex;align-items:center;gap:14px}
.sp-ico{font-size:20px;flex-shrink:0}
.sp-title{font-size:12px;font-weight:700;color:var(--green);margin-bottom:3px}
.sp-desc{font-size:11px;color:var(--t3);line-height:1.5}

/* PRIORITY LEGEND */
.pleg{display:flex;gap:16px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.pleg-item{display:flex;align-items:center;gap:6px;font-size:10.5px;font-family:var(--mono);color:var(--t3)}
.pleg-dot{width:8px;height:8px;border-radius:50%}

/* TOAST */
.toast{position:fixed;bottom:22px;right:22px;background:var(--ink2);border:1px solid var(--line2);border-radius:10px;padding:10px 18px;font-size:12px;font-weight:600;color:var(--t1);z-index:300;transform:translateY(70px);opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);font-family:var(--mono);box-shadow:0 8px 32px rgba(0,0,0,.4)}
.toast.show{transform:translateY(0);opacity:1}
.spin-wrap{display:flex;align-items:center;justify-content:center;height:200px;gap:10px;color:var(--t3);font-family:var(--mono);font-size:11px}
.spin{width:14px;height:14px;border:2px solid var(--ink5);border-top-color:var(--violet);border-radius:50%;animation:s .7s linear infinite}
@keyframes s{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:30px;color:var(--t3);font-family:var(--mono);font-size:11px}
</style>
</head>
<body>

<aside class="sb">
  <div class="logo">
    <div class="logo-chip"><div class="logo-dot"></div><span>Internal HQ</span></div>
    <div class="logo-name">TraderCortex</div>
    <div class="logo-sub">build dashboard · v2.2</div>
  </div>

function sort(arr){return[...arr].sort((a,b)=>(P[a.prio]??2)-(P[b.prio]??2))}
function pct(d,t){return t?Math.round(d/t*100):0}

async function sbq(path,method='GET',body=null){
  const r=await fetch(SB+'/rest/v1/'+path,{method,headers:H,body:body?JSON.stringify(body):null});
  if(!r.ok)throw new Error(await r.text());
  return method==='DELETE'?null:r.json();
}

function renderTasks(c){
  const all=T.filter(t=>t.cat===c);
  const open=all.filter(t=>t.st!=='done');
  const done=all.filter(t=>t.st==='done');
  const crit=open.filter(t=>t.prio==='critical').length;
  const p=pct(done.length,all.length);
  const horizons = [
    {id:'all', label:'Все'},
    {id:'today', label:'Сегодня'},
    {id:'week', label:'Эта неделя'},
    {id:'later', label:'Потом'}
  ];
  let fil=filt==='all'?all:filt==='open'?open:filt==='today'?all.filter(t=>t.st==='in-progress'):filt==='week'?all.filter(t=>t.st==='todo'&&(t.prio==='critical'||t.prio==='high')):filt==='later'?all.filter(t=>t.st==='todo'&&(t.prio==='medium'||t.prio==='low')):all.filter(t=>t.st===filt);

// ── TASK CARD ──
function tcard(t){
  const pc={critical:'p-c',high:'p-h',medium:'p-m',low:'p-l'}[t.prio]||'p-l';
  const cc={done:'done',partial:'partial','in-progress':'wip'}[t.st]||'';
  const ci={done:'✓',partial:'~','in-progress':'→'}[t.st]||'';
  const stcls={done:'tg2',partial:'ta','in-progress':'tc',todo:'tg'}[t.st]||'tg';
  const phn={'post-mvp':'post-mvp','q3-2026':'Q3 2026','q4-2026':'Q4 2026','q1-2027':'Q1 2027','backlog':'backlog'}[t.phase]||t.phase||'';
  const isDone=t.st==='done';
  return`<div class="task${isDone?' tdone':''}" onclick="cycle('${t.id}')">
    <div class="pbar ${pc}"></div>
    <div class="chk ${cc}">${ci}</div>
    <div class="tb">
      <div class="tt${isDone?' s':''}">${t.title}</div>
      ${t.desc?`<div class="td">${t.desc}</div>`:''}
      <div class="tags">
        <span class="tag ${stcls}">${t.st}</span>
        <span class="tag tg">${t.prio}</span>
        ${phn?`<span class="tag tg">${phn}</span>`:''}
      </div>
    </div>
  </div>`;
}

// ── CYCLE ──
async function cycle(id){
  const t=T.find(x=>x.id===id);if(!t)return;
  const nx={todo:'in-progress','in-progress':'done',done:'todo',partial:'done'}[t.st]||'done';
  t.st=nx;
  try{
    const uid=String(id);
    if(uid.length===36)
      await sbq(`roadmap_tasks?id=eq.${id}`,'PATCH',{status:nx});
  }catch(e){}
  badges();
  toast(`${nx==='done'?'✓':nx==='in-progress'?'→':'↺'} ${t.title.slice(0,42)}`);
  const R={dashboard:renderDash,agents:renderAgents,roadmap:renderRoadmap,bugs:renderBugs};
  if(page==='tasks')renderTasks(cat);else if(R[page])R[page]();
}

  if(!v.trim()){d.classList.remove('open');return}
  const res=T.filter(t=>t.title.toLowerCase().includes(v.toLowerCase())||(t.desc&&t.desc.toLowerCase().includes(v.toLowerCase()))).slice(0,7);
  const bugRes=T.filter(t=>t.cat==='bugs'&&(t.title.toLowerCase().includes(v.toLowerCase())||(t.desc&&t.desc.toLowerCase().includes(v.toLowerCase())))).slice(0,3);
  const allRes=[...res.filter(t=>t.cat!=='bugs'),...bugRes].slice(0,7);
  const pc={critical:'var(--rose)',high:'var(--amber)',medium:'var(--blue)',low:'var(--t3)'};
  if(!allRes.length){d.innerHTML='<div class="sd-row"><div class="sd-t" style="color:var(--t3)">Не найдено</div></div>';d.classList.add('open');return}
  d.innerHTML=allRes.map(t=>`<div class="sd-row" onclick="jump('${t.id}','${t.cat}')">
    <div class="sd-pbar" style="background:${pc[t.prio]||'var(--t3)'}"></div>
    <div><div class="sd-t">${t.cat==='bugs'?'<span style="color:var(--rose);font-family:var(--mono);font-size:9px;font-weight:700;margin-right:6px">[БАГ]</span>':''}${t.title}</div><div class="sd-m">${t.cat} · ${t.prio} · ${t.st}</div></div>
  </div>`).join('');
  d.classList.add('open');
}
function closeSearch(){document.getElementById('sdrop').classList.remove('open')}
function jump(id,c){closeSearch();document.getElementById('sinput').value='';go('tasks',c)}

// ── ADD ──
function openModal(){if(cat)document.getElementById('f-c').value=cat;document.getElementById('overlay').classList.add('open');setTimeout(()=>document.getElementById('f-t').focus(),100)}
function closeModal(){document.getElementById('overlay').classList.remove('open')}
async function saveTask(){
  const title=document.getElementById('f-t').value.trim();if(!title){toast('Введи название');return}
  const t={title,desc:document.getElementById('f-d').value.trim(),cat:document.getElementById('f-c').value,prio:document.getElementById('f-p').value,phase:document.getElementById('f-ph').value,st:'todo'};
  try{const r=await sbq('roadmap_tasks','POST',{title:t.title,description:t.desc,category:t.cat,priority:t.prio,phase:t.phase,status:'todo'});T.unshift({...t,id:Array.isArray(r)?r[0].id:'new-'+Date.now()})}
  catch(e){T.unshift({...t,id:'loc-'+Date.now()})}
  closeModal();document.getElementById('f-t').value='';document.getElementById('f-d').value='';
  badges();go(page,cat);toast('✓ Задача создана');
}

// ── UTILS ──
function inject(h){document.getElementById('content').innerHTML=h}
function toast(m){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2600)}
function setConn(ok,msg){
  document.getElementById('cdot').className='conn-d'+(ok?' live':' err');
  document.getElementById('clbl').textContent=ok?'connected · supabase':msg||'offline · local';
}

// ── INIT ──
async function init(){
  try{
    const data=await sbq('roadmap_tasks?order=created_at.desc');
    T=data&&data.length>0?data.map(r=>({...r,cat:r.category,prio:r.priority,st:r.status,desc:r.description})):seed();
    setConn(data&&data.length>0);
    if(!data||!data.length)setConn(false,'local · seed data');
  }catch(e){T=seed();setConn(false,'offline · local')}
  badges();go('dashboard');
}

document.addEventListener('keydown',e=>{
  if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();document.getElementById('sinput').focus()}
  if(e.key==='Escape'){closeModal();closeSearch()}
});

init();
</script>
